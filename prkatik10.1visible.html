<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlow visible</title>
    <style>
        div {
            background-color: azure;
            width: 200px;
            height: 65px;
            border: 1px solid;
            overflow: visible;
        }
    </style>
</head>
<body>
    <h2>Overlow: visible</h2>

    <p>By default, the overlow is visible,
        meaning that it is not clipped and it
        renders outside the element's box.
    </p>

    <div>You can use the overlow property
        whem you want to heve better control of layout.
        The overlow property specivies what heppens
        if content overflow an element's box.
    </div>
</body>
</html>
