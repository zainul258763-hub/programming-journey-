<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlow auto</title>
    <style>
        div {
            background-color: coral;
            width: 200px;
            height: 65px;
            border: 1px solid black;
            overflow: auto;
        }

    </style>
</head>
<body>
    <h2>Overlow: auto</h2>

    <p>The auto value is similar to scroll, only it add scrollbars when necessary:</p>

    <div>You can use the overlow property when you want to</div>
    have better control of the layout. 
    THe overlow property specifies what happens 
    if content overflow an element box.
</body>
</html>
