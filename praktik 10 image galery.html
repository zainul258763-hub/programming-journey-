<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div.gallery{
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        div.gallery-item{
            margin: 5px;
            border: 1px solid #ccc;
            width: 100px;
        }
        div.gallery-item:hover{
            border: 1px solid #777;
        }
        div.gallery-item img{
            width: 100%;
            height: auto;
        }
        div.galery-item div.desc {
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>Image gallery</h2>

    <div class="galery-item">
       <a target="_blank" href="Logo-RPL (1).png">
        <img src="Logo-RPL (1).png" alt="Cinque Terre" width="600" height="400">
       </a>
       <div class="desc">Cinque Terre</div>
    </div>

    <div class="galery-item">
        <a  target="_blank" href="Logo-RPL (1).png">
            <img src="Logo-RPL (1).png" alt="Forest" width="600" height="400">
        </a>
        <div class="desc">Green Forest</div>
    </div>

    <div class="gallery-item">
        <a  target="_blank" href="Logo-RPL (1).png">
            <img src="Logo-RPL (1).png" alt="Northern Lights" width="600" height="400">
        </a>
        <div class="desc">Northen Lights</div>
    </div>

    <div class="galery-item">
        <a  target="_blank" href="Logo-RPL (1).png">
            <img src="Logo-RPL (1).png" alt="Mountains" width="600" height="400">
        </a>
        <div class="desc">Mountains</div>
    </div>
</body>
</html>
