<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         body {
            font-family: Arial,sans-serif;
            text-align: center;
            padding: 30px;
        }

        .title {
            margin-bottom: 30px;
        }

        .gallery-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .gallery-container img {
            width: 150px;
            height: auto;
            border-radius: 8px;
        
        }

    </style>
</head>
<body>
    <h2 class="title">Galery Foto</h2>
    <div class="gallery-container">
        <img src="botak.webp" alt="Foto 1">
        <img src="botak.webp" alt="Foto 2">
        <img src="botak.webp" alt="Foto 3">
        <img src="botak.webp" alt="Foto 4">
    </div>
</body>
</html>
